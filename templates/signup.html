<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MedSwift - Create Account</title>
<link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body class="auth-body">
<div class="auth-container">
  <a href="/" class="auth-logo">
    <div class="logo-cross">+</div>
    <span class="logo-text">MedSwift</span>
  </a>
  <div class="auth-card">
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-sub">Set up your emergency profile in seconds</p>

    <div id="error-msg" class="alert-error" style="display:none;"></div>

    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input type="text" id="name" class="form-input" placeholder="Your full name"/>
    </div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" id="email" class="form-input" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Phone Number</label>
      <input type="tel" id="phone" class="form-input" placeholder="+91 98765 43210"/>
    </div>
    <div class="form-group">
      <label class="form-label">Emergency Contact Email</label>
      <input type="email" id="emergency-email" class="form-input" placeholder="contact@example.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-input" placeholder="Minimum 6 characters"/>
    </div>

    <button id="signup-btn" class="btn-primary btn-full" onclick="handleSignup()">Create Account</button>

    <div class="auth-divider">or continue with</div>

    <button class="btn-google btn-full" onclick="handleGoogleSignup()">
      <svg width="18" height="18" viewBox="0 0 18 18" style="margin-right:10px;">
        <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
        <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
        <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/>
        <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/>
      </svg>
      Continue with Google
    </button>

    <p class="auth-switch">Have an account? <a href="/login">Sign in &rarr;</a></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
const firebaseConfig = {{ firebase_config | tojson }};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function showError(msg) {
  const el = document.getElementById("error-msg");
  el.textContent = msg;
  el.style.display = "block";
}

async function handleSignup() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const btn = document.getElementById("signup-btn");
  if (!name || !email || !password) { showError("Please fill all required fields."); return; }
  if (password.length < 6) { showError("Password must be at least 6 characters."); return; }
  btn.textContent = "Creating account...";
  btn.disabled = true;
  try {
    const result = await auth.createUserWithEmailAndPassword(email, password);
    await result.user.updateProfile({ displayName: name });
    localStorage.setItem("medswift_emergency_email", document.getElementById("emergency-email").value);
    localStorage.setItem("medswift_phone", document.getElementById("phone").value);
    window.location.href = "/dashboard";
  } catch (err) {
    showError(err.message);
    btn.textContent = "Create Account";
    btn.disabled = false;
  }
}

async function handleGoogleSignup() {
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    await auth.signInWithPopup(provider);
    window.location.href = "/dashboard";
  } catch (err) { showError(err.message); }
}
</script>
</body>
</html>
