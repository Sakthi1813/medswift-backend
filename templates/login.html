<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MedSwift - Sign In</title>
<link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body class="auth-body">
<div class="auth-container">
  <a href="/" class="auth-logo">
    <div class="logo-cross">+</div>
    <span class="logo-text">MedSwift</span>
  </a>
  <div class="auth-card">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to access your emergency dashboard</p>

    <div id="error-msg" class="alert-error" style="display:none;"></div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" id="email" class="form-input" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-input" placeholder="Enter your password"/>
    </div>

    <button id="login-btn" class="btn-primary btn-full" onclick="handleLogin()">Sign In</button>

    <div class="auth-divider">or continue with</div>

    <button class="btn-google btn-full" onclick="handleGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 18 18" style="margin-right:10px;">
        <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
        <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
        <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/>
        <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/>
      </svg>
      Continue with Google
    </button>

    <p class="auth-switch">No account? <a href="/signup">Create one &rarr;</a></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
const firebaseConfig = {{ firebase_config | tojson }};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function showError(msg) {
  const el = document.getElementById("error-msg");
  el.textContent = msg;
  el.style.display = "block";
}

async function handleLogin() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const btn = document.getElementById("login-btn");
  if (!email || !password) { showError("Please enter email and password."); return; }
  btn.textContent = "Signing in...";
  btn.disabled = true;
  try {
    await auth.signInWithEmailAndPassword(email, password);
    window.location.href = "/dashboard";
  } catch (err) {
    showError(err.message);
    btn.textContent = "Sign In";
    btn.disabled = false;
  }
}

async function handleGoogleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    await auth.signInWithPopup(provider);
    window.location.href = "/dashboard";
  } catch (err) { showError(err.message); }
}

document.addEventListener("keydown", e => { if (e.key === "Enter") handleLogin(); });
</script>
</body>
</html>
