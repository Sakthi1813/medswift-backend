services:
  - type: web
    name: medswift-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: FLASK_SECRET_KEY
        generateValue: true
